name: Copy Container

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Skopeo
        run: sudo apt install -y skopeo

      - name: Show Version
        run: skopeo -v

      - name: Show SystemVersion
        run: |
          cat /etc/os-release
          pwd
          ls .
          curl cip.cc

      - name: ping
        run: sudo ping -i 0.1 -c 300 1.31.32.155

      #- name: copy nginx
